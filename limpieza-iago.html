<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Limpieza Iago">
<meta name="theme-color" content="#0f1419">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧹</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧹</text></svg>">
<title>Mi limpieza · Iago</title>
<style>
  :root{
    --bg:#0f1419; --panel:#161d26; --card:#1b2430; --line:#2a3543;
    --ink:#eaf0f6; --muted:#8a98a8;
    --accent:#2563eb; --accent-soft:#dbe6fd;
    --other:#10b981;
    --iago:#3b82f6; --laura:#10b981;
    --verde:#22a55b; --amarillo:#eab308; --naranja:#ea7317; --rojo:#d83a3a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(700px 420px at 110% -8%, #1c2a3f 0%, transparent 60%), var(--bg);
    color:var(--ink);min-height:100vh;
    padding:max(16px,env(safe-area-inset-top)) 14px calc(28px + env(safe-area-inset-bottom));
    -webkit-user-select:none;user-select:none;}
  .wrap{max-width:560px;margin:0 auto}

  header{padding:6px 4px 4px;position:relative}
  .hi{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .date{font-size:14px;color:var(--muted);text-transform:capitalize;margin-top:3px}

  .caption{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:16px 2px 8px}
  .lastreg{font-size:11.5px;color:var(--muted);margin:14px 2px 0}
  .lastreg b{color:var(--ink)}

  /* tarjetas HOY */
  .today-cards{display:flex;gap:9px}
  .tcard{flex:1;min-width:0;background:var(--card);border:1px solid var(--line);border-top:3px solid var(--line);border-radius:14px;padding:11px 11px 12px;position:relative}
  .tcard.col-iago{border-top-color:var(--iago)}
  .tcard.col-laura{border-top-color:var(--laura)}
  .tcard-head{display:flex;align-items:center;gap:6px}
  .th-name{font-size:13.5px;font-weight:800}
  .col-iago .th-name{color:#6ea8ff}
  .col-laura .th-name{color:#3fd9a3}
  .th-count{margin-left:auto;font-family:"Arial Narrow",Arial;font-size:30px;font-weight:800;line-height:1}
  .col-iago .th-count{color:#6ea8ff}
  .col-laura .th-count{color:#3fd9a3}
  .th-sub{font-size:10.5px;color:var(--muted);margin-top:-2px}
  .reqmini{background:#3a2f0a;border:1px solid #6b5410;color:#ffd24d;border-radius:8px;font-size:13px;line-height:1;padding:4px 6px;cursor:pointer}
  .tchips{display:flex;flex-direction:column;gap:5px;margin-top:9px}
  .tchip{display:block;width:100%;font-size:12px;font-weight:700;border-radius:7px;padding:6px 9px;line-height:1.2;background:#2a3543;color:#cdd7e1}
  .tchip.verde{background:#34c277;color:#08230f}
  .tchip.amarillo{background:#f1c40f;color:#3a2f00}
  .tchip.naranja{background:#f3853a;color:#3a1c05}
  .tchip.rojo{background:#e85d5d;color:#3a0d0d}
  .tchip.mine{cursor:pointer}
  .tchip-empty{font-size:12px;color:var(--muted);padding:3px 0}

  /* tarjeta semana */
  .wkcard{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-top:11px;overflow:hidden}
  .wkhead{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer}
  .wktitle{font-size:13px;font-weight:800;letter-spacing:.04em}
  .wkcounts{margin-left:auto;font-family:"Arial Narrow",Arial;font-size:22px;font-weight:800}
  .wkcounts .ci{color:#6ea8ff}
  .wkcounts .cl{color:#3fd9a3}
  .wkcounts .sep{color:var(--muted);font-weight:400;margin:0 4px}
  .wkcaret{color:var(--muted);transition:transform .15s}
  .wkcard.open .wkcaret{transform:rotate(180deg)}
  .wkbody{display:none;padding:0 12px 12px}
  .wkcard.open .wkbody{display:block}
  .bcols{display:flex;gap:9px}
  .bcol{flex:1;min-width:0;background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--line);border-radius:11px;padding:9px 10px}
  .bcol.col-iago{border-top-color:var(--iago)}
  .bcol.col-laura{border-top-color:var(--laura)}
  .bcolhead{font-size:12px;font-weight:800;margin-bottom:6px}
  .col-iago .bcolhead{color:#6ea8ff}
  .col-laura .bcolhead{color:#3fd9a3}
  .crow{display:flex;gap:6px;align-items:baseline;border-radius:7px;padding:6px 9px;margin-bottom:5px;background:#2a3543;color:#cdd7e1}
  .crow.verde{background:#34c277;color:#08230f}
  .crow.amarillo{background:#f1c40f;color:#3a2f00}
  .crow.naranja{background:#f3853a;color:#3a1c05}
  .crow.rojo{background:#e85d5d;color:#3a0d0d}
  .cname{flex:1;min-width:0;font-size:12.5px;line-height:1.25;font-weight:600}
  .cday{font-size:10.5px;white-space:nowrap;opacity:.7}
  .cempty{font-size:12px;color:var(--muted);padding:4px 0}

  /* listas de tareas */
  .sec{margin-top:18px}
  .sec h3{display:flex;align-items:center;gap:8px;margin:0 0 9px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:800}
  .sec h3 .cnt{margin-left:auto;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:2px 9px;font-size:11px;color:var(--ink)}
  .sec.collapsed .body{display:none}
  .sec h3.click{cursor:pointer}
  .sec h3 .car{transition:transform .15s}
  .sec.collapsed h3 .car{transform:rotate(-90deg)}

  .card{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:9px}
  .card.verde{border-left-color:var(--verde)}
  .card.amarillo{border-left-color:var(--amarillo)}
  .card.naranja{border-left-color:var(--naranja)}
  .card.rojo{border-left-color:var(--rojo)}
  .check{width:30px;height:30px;border-radius:50%;border:2.5px solid #3a4856;flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent;font-size:16px;font-weight:900;transition:all .15s}
  .check:active{transform:scale(.9)}
  .card.done .check{background:var(--accent);border-color:var(--accent);color:#fff}
  .card.done .tname{color:var(--muted);text-decoration:line-through}
  .tinfo{flex:1;min-width:0}
  .tname{font-size:15.5px;font-weight:600;line-height:1.2}
  .tsub{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
  .tsub .z{color:#9fb0c2}
  .badge{font-size:10.5px;font-weight:800;border-radius:999px;padding:2px 8px;letter-spacing:.03em}
  .badge.due{background:#3a1d1d;color:#ff9a9a}
  .badge.soon{background:#1e2a1c;color:#9fd99f}
  .badge.freq{background:var(--panel);color:var(--muted);border:1px solid var(--line)}
  .empty{color:var(--muted);font-size:13px;padding:10px 2px}

  /* ajustes */
  .setrow{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:9px}
  .setrow .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .setrow .nm{font-size:15px;font-weight:600}
  .setrow .last{font-size:11px;color:var(--muted)}
  .freqs{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .f{border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:999px;padding:6px 11px;font-size:11.5px;font-weight:700;cursor:pointer}
  .f.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
  .toolbar{display:flex;gap:8px;margin:4px 0 16px}
  .toolbar button{flex:1;border-radius:10px;padding:11px;font-weight:700;font-size:12.5px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--muted)}
  .toolbar .warn{color:#ffb4b4;border-color:#5a2b2b}
  .note{font-size:12px;color:var(--muted);line-height:1.5;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:14px}

  /* barra inferior / volver */
  .bottombar{margin-top:24px;text-align:center}
  .bottombar button{background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:11px;padding:11px 18px;font-size:13px;font-weight:700;cursor:pointer}
  .backbtn{background:transparent;border:none;color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;padding:4px 0;margin-bottom:6px}
  #view-ajustes{display:none}

  /* campana de solicitudes */
  .bell{position:fixed;top:calc(12px + env(safe-area-inset-top));right:14px;z-index:60;display:none;align-items:center;justify-content:center;
    width:46px;height:46px;border-radius:50%;background:#3a2f0a;border:1px solid #7a5f12;color:#ffd24d;font-size:20px;cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,.4);animation:ring 1.4s ease-in-out infinite}
  @keyframes ring{0%,100%{box-shadow:0 6px 18px rgba(0,0,0,.4),0 0 0 0 rgba(234,179,8,0)}50%{box-shadow:0 6px 18px rgba(0,0,0,.4),0 0 0 8px rgba(234,179,8,.22)}}
  .bellcount{position:absolute;top:-4px;right:-4px;background:var(--rojo);color:#fff;font-size:11px;font-weight:800;border-radius:999px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 4px}

  /* modal */
  .modal{position:fixed;inset:0;background:rgba(8,11,16,.7);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:70}
  .modal.open{display:flex}
  .modal-card{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:82vh;display:flex;flex-direction:column;padding-bottom:calc(14px + env(safe-area-inset-bottom))}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid var(--line)}
  .modal-head span{font-size:15px;font-weight:800}
  .modal-head button{background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer}
  .modal-body{overflow:auto;padding:10px 14px}
  .pickout{background:#2c2408;border:1px solid #6b5410;border-radius:11px;padding:9px 11px;margin-bottom:12px}
  .reqoutlbl{font-size:11px;color:#e7c65a;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;font-weight:800}
  .reqoutrow{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);padding:3px 0}
  .reqoutrow span{flex:1}
  .reqcancel{background:transparent;border:1px solid #6b5410;color:#ffd24d;border-radius:7px;padding:2px 9px;cursor:pointer;font-size:12px}
  .pickzone{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:12px 0 6px}
  .pickrow{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 13px;margin-bottom:7px;color:var(--ink);font-size:14.5px;cursor:pointer}
  .pickrow:active{background:#222d3a}
  .reqmodalitem2{display:flex;align-items:center;gap:10px;background:#3a2f0a;border:1px solid #7a5f12;border-radius:11px;padding:11px 13px;margin-bottom:9px}
  .reqmodalitem2>div{flex:1;min-width:0}
  .reqfrom{font-size:11px;color:#e7c65a;text-transform:uppercase;letter-spacing:.08em;font-weight:800}
  .reqname{font-size:15.5px;font-weight:700;color:#fff}
  .reqdone{background:var(--amarillo);color:#3a2f00;border:none;border-radius:9px;padding:9px 12px;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap}

  @media (max-width:420px){.th-count{font-size:26px}}

  /* botón fin de semana (baño + estudio) */
  .wkbtn{position:fixed;top:calc(12px + env(safe-area-inset-top));left:14px;z-index:60;display:none;align-items:center;justify-content:center;width:46px;height:46px;border-radius:50%;font-size:15px;font-weight:800;letter-spacing:.5px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.4)}
  .wkbtn.clean{background:#ffffff;color:#1b2430;border:1px solid #ffffff;animation:ringW 1.5s ease-in-out infinite}
  .wkbtn.over{background:#e11d2a;color:#fff;border:1px solid #ff6b6b;animation:blinkR .7s steps(1,end) infinite}
  @keyframes ringW{0%,100%{box-shadow:0 6px 18px rgba(0,0,0,.4),0 0 0 0 rgba(255,255,255,0)}50%{box-shadow:0 6px 18px rgba(0,0,0,.4),0 0 0 9px rgba(255,255,255,.30)}}
  @keyframes blinkR{0%{opacity:1;box-shadow:0 6px 18px rgba(0,0,0,.4),0 0 0 0 rgba(225,29,42,.55)}50%{opacity:.4;box-shadow:0 6px 18px rgba(0,0,0,.4),0 0 0 11px rgba(225,29,42,0)}100%{opacity:1}}

  .wkitem{display:flex;align-items:center;gap:10px;border-radius:12px;padding:12px 13px;margin-bottom:9px}
  .wkitem.clean{background:#ffffff;color:#1b2430;border:1px solid #fff;animation:ringW 1.6s ease-in-out infinite}
  .wkitem.over{background:#e11d2a;color:#fff;border:1px solid #ff6b6b;animation:blinkR .7s steps(1,end) infinite}
  .wkitem>div{flex:1;min-width:0}
  .wklbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;opacity:.7;color:inherit}
  .wkname{font-size:15.5px;font-weight:700;color:inherit;margin-top:1px}
  .wkdoneBtn{border:none;border-radius:9px;padding:9px 12px;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap}
  .wkitem.clean .wkdoneBtn{background:#1b2430;color:#fff}
  .wkitem.over .wkdoneBtn{background:#fff;color:#e11d2a}
</style>
</head>
<body>
<button class="wkbtn" id="wkbtn" title="Baño y estudio (fin de semana)">WC</button>
<button class="bell" id="bell">🔔<span class="bellcount" id="bellCount"></span></button>
<div class="wrap">
  <header>
    <div class="hi">Mi limpieza · Iago</div>
    <div class="date" id="date"></div>
  </header>

  <div id="view-hoy">
    <div class="lastreg" id="lastReg">Última tarea registrada: —</div>
    <div class="caption">Hoy</div>
    <div class="today-cards" id="todayCards"></div>

    <div class="wkcard" id="wkcard">
      <div class="wkhead" id="wkHead"><span class="wktitle">Última semana</span><span class="wkcounts"><b class="ci" id="wkCi">0</b><span class="sep">·</span><b class="cl" id="wkCl">0</b></span><span class="wkcaret">▾</span></div>
      <div class="wkbody" id="wkBody"></div>
    </div>

    <div class="sec" id="sec-diarias"><h3>Diarias <span class="cnt" id="cnt-d">0</span></h3><div class="body" id="list-diarias"></div></div>
    <div class="sec" id="sec-pend"><h3>Pendientes <span class="cnt" id="cnt-p">0</span></h3><div class="body" id="list-pend"></div></div>
    <div class="sec collapsed" id="sec-aldia"><h3 class="click"><span class="car">▾</span> Al día <span class="cnt" id="cnt-a">0</span></h3><div class="body" id="list-aldia"></div></div>

    <div class="bottombar"><button id="goAjustes">⚙ Ajustes y frecuencias</button></div>
  </div>

  <div id="view-ajustes">
    <button class="backbtn" id="backHoy">‹ Volver a hoy</button>
    <div class="note">Ajusta cada cuánto toca cada tarea. Al marcar una hecha, no vuelve a aparecer hasta que pasa su intervalo (Diario 1 día · 2×sem 3 · 1×sem 7 · 1×mes 30 · 2-3×año 120).</div>
    <div class="toolbar">
      <button id="allDone">Marcar todo al día</button>
      <button class="warn" id="reset">Borrar histórico</button>
    </div>
    <div id="list-set"></div>
  </div>
</div>

<div class="modal" id="modal"><div class="modal-card"><div class="modal-head"><span id="modalTitle"></span><button id="modalClose">✕</button></div><div class="modal-body" id="modalBody"></div></div></div>

<script>
const INTERVAL={diario:1,"2sem":3,"1sem":7,"1mes":30,anyo:120};
const FREQS=[{k:"diario",l:"Diario"},{k:"2sem",l:"2×sem"},{k:"1sem",l:"1×sem"},{k:"1mes",l:"1×mes"},{k:"anyo",l:"2-3×año"}];
const FREQ_SHORT={diario:"Diario","2sem":"2×sem","1sem":"1×sem","1mes":"1×mes",anyo:"2-3×año"};
const ME="iago", OTHER="laura";
const TASKS = [
  {id:"z0-0",n:"Aspirar",z:"Suelos",diff:"verde",freq:"diario"},
  {id:"z7-2",n:"Sacar a Visma por la mañana",z:"Visma",diff:"amarillo",freq:"diario"},
  {id:"z0-1",n:"Aspirar + fregar",z:"Suelos",diff:"amarillo",freq:"2sem"},
  {id:"z8-2",n:"Bajar la basura",z:"Entrada y basura",diff:"naranja",freq:"2sem"},
  {id:"z1-0",n:"Baño Iago",z:"Baños",diff:"naranja",freq:"1sem"},
  {id:"z2-0",n:"Estudio Iago",z:"Espacios de trabajo",diff:"naranja",freq:"1sem"},
  {id:"z3-0",n:"Fregadero y repisa",z:"Cocina",diff:"naranja",freq:"1sem"},
  {id:"z3-1",n:"Superficies verticales cocina",z:"Cocina",diff:"amarillo",freq:"1sem"},
  {id:"z3-2",n:"Mampara y electrodomésticos",z:"Cocina",diff:"amarillo",freq:"1sem"},
  {id:"z3-3",n:"Interior nevera",z:"Cocina",diff:"naranja",freq:"1mes"},
  {id:"z3-4",n:"Interior alacenas",z:"Cocina",diff:"naranja",freq:"1mes"},
  {id:"z3-5",n:"Fregadero / tendal",z:"Cocina",diff:"verde",freq:"1mes"},
  {id:"z8-3",n:"Limpiar el cubo de la basura",z:"Entrada y basura",diff:"rojo",freq:"1mes"},
  {id:"z3-6",n:"Parte superior nevera y lavadora",z:"Cocina",diff:"verde",freq:"anyo"},
];
const OTHER_TASKS=[
 {z:"Baños",t:["Baño Laura"]},
 {z:"Espacios de trabajo",t:["Taller Laura"]},
 {z:"Salón",t:["Comedero Visma","Ordenar armarios salón","Superficies horizontales salón","Ordenar sofá","Espejo salón"]},
 {z:"Habitación",t:["Ordenar armarios habitación","Mesillas","Cambiar sábanas","Hacer la cama","Espejo habitación"]},
 {z:"Ventanas",t:["Ventanas por dentro","Ventanas por fuera"]},
 {z:"Visma",t:["Cepillar a Visma","Entrenamiento Visma"]},
 {z:"Entrada y basura",t:["Puertas","Muebles entrada"]},
];
const DIFF={"Aspirar":"verde","Aspirar + fregar":"amarillo","Baño Iago":"naranja","Baño Laura":"naranja","Estudio Iago":"naranja","Taller Laura":"naranja","Fregadero y repisa":"naranja","Superficies verticales cocina":"amarillo","Mampara y electrodomésticos":"amarillo","Interior nevera":"naranja","Interior alacenas":"naranja","Fregadero / tendal":"verde","Parte superior nevera y lavadora":"verde","Comedero Visma":"verde","Ordenar armarios salón":"amarillo","Superficies horizontales salón":"naranja","Ordenar sofá":"verde","Espejo salón":"verde","Ordenar armarios habitación":"verde","Mesillas":"verde","Cambiar sábanas":"amarillo","Hacer la cama":"verde","Espejo habitación":"verde","Ventanas por dentro":"naranja","Ventanas por fuera":"rojo","Cepillar a Visma":"verde","Entrenamiento Visma":"verde","Sacar a Visma por la mañana":"amarillo","Puertas":"verde","Muebles entrada":"verde","Bajar la basura":"naranja","Limpiar el cubo de la basura":"rojo"};

const SB_URL="https://woiptkyrxkbpnvioypit.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvaXB0a3lyeGticG52aW95cGl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NzI2ODYsImV4cCI6MjA5MjA0ODY4Nn0.B2nKgj5rD0rkdLeMIrd9KgD8lUPWsBT4Y7aCtmnvbjA";
const SB_HEAD={apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json"};
const nameToId={}; TASKS.forEach(t=>nameToId[t.n]=t.id);
function taskById(id){ return TASKS.find(t=>t.id===id); }

const WEEKEND_TASKS=["z1-0","z2-0"];
function lastSaturday(){ const d=new Date(); const since=(d.getDay()+1)%7; d.setDate(d.getDate()-since); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function wkDone(id){ const l=lastDone(id); return l && l>=lastSaturday(); }
function wkPending(){ return WEEKEND_TASKS.filter(id=>!wkDone(id)); }
function renderWeekendBtn(){
  const b=document.getElementById("wkbtn"); if(!b) return;
  if(!WEEKEND_TASKS.length){ b.style.display="none"; return; }
  const pend=wkPending();
  if(!pend.length){ b.style.display="none"; return; }
  const dow=new Date().getDay(); const weekendNow=(dow===6||dow===0);
  b.style.display="flex"; b.className="wkbtn "+(weekendNow?"clean":"over");
}
function openWeekendModal(){
  const pend=wkPending(); if(!pend.length) return;
  const dow=new Date().getDay(); const cls=(dow===6||dow===0)?"clean":"over";
  const lbl=cls==="clean"?"Fin de semana":"¡Te pasaste de tiempo!";
  const body=pend.map(id=>{ const t=taskById(id); return '<div class="wkitem '+cls+'"><div><div class="wklbl">'+lbl+'</div><div class="wkname">'+t.n+'</div></div><button class="wkdoneBtn" data-wkdone="'+id+'">Hecho ✓</button></div>'; }).join("");
  showModal("Baño y estudio", body);
}
function capit(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

const KEY="limpieza_tracker_iago_v1";
let data={freq:{},history:[]};
function load(){ try{ const raw=localStorage.getItem(KEY); if(raw) data=JSON.parse(raw); }catch(e){} if(!data.freq)data.freq={}; if(!data.history)data.history=[]; }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(data)); }catch(e){} }
function freqOf(t){ return data.freq[t.id]||t.freq; }
function today(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseD(s){ const p=s.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); }
function daysSince(s){ return Math.floor((parseD(today())-parseD(s))/86400000); }
function lastDone(id){ let m=null; data.history.forEach(h=>{ if(h.id===id&&(!m||h.d>m)) m=h.d; }); return m; }
function isDue(t){ const l=lastDone(t.id); if(!l) return true; return daysSince(l)>=INTERVAL[freqOf(t)]; }
function dueIn(t){ const l=lastDone(t.id); if(!l) return 0; return Math.max(0, INTERVAL[freqOf(t)]-daysSince(l)); }
function doneToday(id){ return lastDone(id)===today(); }
function lastTxt(id){ const l=lastDone(id); if(!l) return "nunca hecha"; const d=daysSince(l); return d===0?"hecha hoy":d===1?"hecha ayer":"hecha hace "+d+" días"; }

function mark(id){ const t=taskById(id); data.history.push({id,d:today()}); if(data.history.length>600) data.history=data.history.slice(-600); save(); if(t) sbInsert(t.n); renderHoy(); }
function unmark(id){ const t=taskById(id); for(let i=data.history.length-1;i>=0;i--){ if(data.history[i].id===id&&data.history[i].d===today()){ data.history.splice(i,1); break; } } save(); if(t) sbDelete(t.n); renderHoy(); }
function sbInsert(name){ fetch(SB_URL+"/rest/v1/limpieza_log",{method:"POST",headers:Object.assign({Prefer:"return=minimal"},SB_HEAD),body:JSON.stringify([{persona:ME,tarea:name,fecha:today()}])}).catch(()=>{}); }
function sbDelete(name){ const q="?persona=eq."+ME+"&tarea=eq."+encodeURIComponent(name)+"&fecha=eq."+today(); fetch(SB_URL+"/rest/v1/limpieza_log"+q,{method:"DELETE",headers:SB_HEAD}).catch(()=>{}); }

function cardHTML(t,mode){
  const done=doneToday(t.id); const di=dueIn(t); let badge="";
  if(mode==="aldia") badge='<span class="badge soon">vuelve en '+di+(di===1?" día":" días")+'</span>';
  else if(!done && isDue(t)){ const l=lastDone(t.id); if(l){ const ov=daysSince(l)-INTERVAL[freqOf(t)]; if(ov>0) badge='<span class="badge due">+'+ov+(ov===1?" día":" días")+'</span>'; } }
  return '<div class="card '+t.diff+(done?" done":"")+'" data-id="'+t.id+'"><div class="check" data-tap="'+t.id+'">✓</div><div class="tinfo"><div class="tname">'+t.n+'</div><div class="tsub"><span class="z">'+t.z+'</span><span class="badge freq">'+FREQ_SHORT[freqOf(t)]+'</span><span>'+lastTxt(t.id)+'</span>'+badge+'</div></div></div>';
}
function renderHoy(){
  const diarias=[],pend=[],aldia=[];
  TASKS.forEach(t=>{ if(WEEKEND_TASKS.indexOf(t.id)>=0) return; if(doneToday(t.id)) return; if(isDue(t)){ (freqOf(t)==="diario"?diarias:pend).push(t); } else aldia.push(t); });
  pend.sort((a,b)=>{ const la=lastDone(a.id),lb=lastDone(b.id); const oa=la?daysSince(la)-INTERVAL[freqOf(a)]:999, ob=lb?daysSince(lb)-INTERVAL[freqOf(b)]:999; return ob-oa; });
  aldia.sort((a,b)=>dueIn(a)-dueIn(b));
  const fill=(id,arr,mode,empty)=>{ document.getElementById(id).innerHTML = arr.length?arr.map(t=>cardHTML(t,mode)).join(""):'<div class="empty">'+empty+'</div>'; };
  fill("list-diarias",diarias,"hoy","Nada diario pendiente hoy.");
  fill("list-pend",pend,"hoy","No hay tareas puntuales pendientes hoy.");
  fill("list-aldia",aldia,"aldia","—");
  document.getElementById("cnt-d").textContent=diarias.length;
  document.getElementById("cnt-p").textContent=pend.length;
  document.getElementById("cnt-a").textContent=aldia.length;
  renderBoard();
  renderWeekendBtn();
}
function renderAjustes(){
  document.getElementById("list-set").innerHTML = TASKS.map(t=>{
    const fc=FREQS.map(f=>'<button class="f'+(freqOf(t)===f.k?" sel":"")+'" data-setfreq="'+t.id+'" data-f="'+f.k+'">'+f.l+'</button>').join("");
    return '<div class="setrow"><div class="top"><span class="nm">'+t.n+'</span><span class="last">'+lastTxt(t.id)+'</span></div><div class="freqs">'+fc+'</div></div>';
  }).join("");
}

/* ===== marcador (board) ===== */
let feedRows=[];
function relTime(r){ if(r.creado){ const ms=Date.now()-Date.parse(r.creado); const m=Math.floor(ms/60000); if(m<1) return "ahora mismo"; if(m<60) return "hace "+m+" min"; const h=Math.floor(m/60); if(h<24) return "hace "+h+" h"; } const ds=daysSince(r.fecha); return ds<=0?"hoy":ds===1?"ayer":"hace "+ds+" días"; }
function ownLocalRows(){ return data.history.map(h=>{ const t=taskById(h.id); return t?{persona:ME,tarea:t.n,fecha:h.d,creado:null}:null; }).filter(Boolean); }
function mergedRows(){ const seen=new Set(feedRows.map(r=>r.persona+"|"+r.tarea+"|"+r.fecha)); const ex=ownLocalRows().filter(r=>!seen.has(r.persona+"|"+r.tarea+"|"+r.fecha)); return feedRows.concat(ex); }
function rowKey(r){ return r.creado?Date.parse(r.creado):parseD(r.fecha).getTime(); }
function dayLbl(fecha){ const ds=daysSince(fecha); return ds<=0?"hoy":ds===1?"ayer":"hace "+ds+" d"; }
function todayCard(p, rows){
  const t=today();
  const list=rows.filter(r=>r.persona===p && r.fecha===t).sort((a,b)=>rowKey(b)-rowKey(a));
  const isOther=(p!==ME);
  const reqBtn=isOther?'<button class="reqmini" data-openpick="1" title="Solicitar a '+capit(p)+'">🙏</button>':'';
  const chips=list.length?list.map(r=>{ const d=DIFF[r.tarea]||""; const own=(p===ME); return '<div class="tchip '+d+(own?' mine':'')+'"'+(own?' data-undo="'+encodeURIComponent(r.tarea)+'"':'')+'>'+r.tarea+'</div>'; }).join(""):'<div class="tchip-empty">—</div>';
  return '<div class="tcard col-'+p+'"><div class="tcard-head"><span class="th-name">'+capit(p)+'</span>'+reqBtn+'<span class="th-count">'+list.length+'</span></div><div class="th-sub">tareas hoy</div><div class="tchips">'+chips+'</div></div>';
}
function renderBoard(){
  const rows=mergedRows();
  document.getElementById("todayCards").innerHTML = todayCard("iago",rows)+todayCard("laura",rows);
  let last=null; rows.forEach(r=>{ const k=rowKey(r); if(!last||k>last.k) last={k,r}; });
  const lr=document.getElementById("lastReg");
  if(last){ const who=last.r.persona===ME?"Tú":capit(last.r.persona); lr.innerHTML="Última tarea registrada: <b>"+last.r.tarea+"</b> · "+who+" · "+relTime(last.r); }
  else lr.textContent="Última tarea registrada: —";
  const wi=rows.filter(r=>r.persona==="iago"&&daysSince(r.fecha)<=6);
  const wl=rows.filter(r=>r.persona==="laura"&&daysSince(r.fecha)<=6);
  document.getElementById("wkCi").textContent=wi.length;
  document.getElementById("wkCl").textContent=wl.length;
  const col=(arr,p)=>{ const items=arr.sort((a,b)=>rowKey(b)-rowKey(a)).slice(0,25).map(r=>'<div class="crow '+(DIFF[r.tarea]||"")+'"><span class="cname">'+r.tarea+'</span><span class="cday">'+dayLbl(r.fecha)+'</span></div>').join("")||'<div class="cempty">—</div>'; return '<div class="bcol col-'+p+'"><div class="bcolhead">'+capit(p)+'</div>'+items+'</div>'; };
  document.getElementById("wkBody").innerHTML='<div class="bcols">'+col(wi,"iago")+col(wl,"laura")+'</div>';
}

/* ===== solicitudes ===== */
const REQ_SEEN_KEY=KEY+"_reqseen";
let reqIncoming=[], reqOutgoing=[];
function sbRequest(name){ fetch(SB_URL+"/rest/v1/limpieza_solicitudes",{method:"POST",headers:Object.assign({Prefer:"return=minimal"},SB_HEAD),body:JSON.stringify([{de:ME,para:OTHER,tarea:name,estado:"pendiente"}])}).then(()=>sbFetchReq()).catch(()=>{}); }
async function sbResolve(id, tarea){ try{ await fetch(SB_URL+"/rest/v1/limpieza_solicitudes?id=eq."+id,{method:"DELETE",headers:SB_HEAD}); }catch(e){} const tid=tarea?nameToId[tarea]:null; if(tid&&!doneToday(tid)) mark(tid); sbFetchReq(); }
function sbCancel(id){ fetch(SB_URL+"/rest/v1/limpieza_solicitudes?id=eq."+id,{method:"DELETE",headers:SB_HEAD}).then(()=>sbFetchReq()).catch(()=>{}); }
async function sbFetchReq(){
  try{
    const res=await fetch(SB_URL+"/rest/v1/limpieza_solicitudes?select=id,de,para,tarea,estado,creado&estado=eq.pendiente&order=creado.desc&limit=50",{headers:SB_HEAD});
    if(!res.ok) throw 0;
    const all=await res.json();
    reqIncoming=all.filter(r=>r.para===ME);
    reqOutgoing=all.filter(r=>r.de===ME);
    renderReq();
    let seen=[]; try{ seen=JSON.parse(localStorage.getItem(REQ_SEEN_KEY)||"[]"); }catch(e){}
    const nuevas=reqIncoming.filter(r=>seen.indexOf(r.id)<0);
    try{ localStorage.setItem(REQ_SEEN_KEY, JSON.stringify(reqIncoming.map(r=>r.id))); }catch(e){}
    if(nuevas.length) openReqModal();
  }catch(e){}
}
function renderReq(){
  const bell=document.getElementById("bell");
  if(reqIncoming.length){ bell.style.display="flex"; document.getElementById("bellCount").textContent=reqIncoming.length; }
  else bell.style.display="none";
}
function showModal(title,html){ document.getElementById("modalTitle").textContent=title; document.getElementById("modalBody").innerHTML=html; document.getElementById("modal").classList.add("open"); }
function closeModal(){ document.getElementById("modal").classList.remove("open"); }
function openReqModal(){
  if(!reqIncoming.length) return;
  const body=reqIncoming.map(r=>'<div class="reqmodalitem2"><div><div class="reqfrom">'+capit(r.de)+' te pide</div><div class="reqname">'+r.tarea+'</div></div><button class="reqdone" data-done="'+r.id+'">Hecho ✓</button></div>').join("");
  showModal("Te piden prioridad", body);
}
function openPicker(){
  let out = reqOutgoing.length ? '<div class="pickout"><div class="reqoutlbl">Ya pediste a '+capit(OTHER)+':</div>'+reqOutgoing.map(r=>'<div class="reqoutrow"><span>'+r.tarea+'</span><button class="reqcancel" data-cancel="'+r.id+'">✕</button></div>').join("")+'</div>' : '';
  const body=out+OTHER_TASKS.map(g=>'<div class="pickzone">'+g.z+'</div>'+g.t.map(n=>'<button class="pickrow" data-pick="'+encodeURIComponent(n)+'">'+n+'</button>').join("")).join("");
  showModal("Pide a "+capit(OTHER)+" que priorice", body);
}

/* ===== sync ===== */
async function sbFetch(){
  try{
    const res=await fetch(SB_URL+"/rest/v1/limpieza_log?select=persona,tarea,fecha,creado&order=creado.desc&limit=120",{headers:SB_HEAD});
    if(!res.ok) throw 0;
    const rows=await res.json();
    feedRows=rows;
    try{ localStorage.setItem(KEY+"_feed", JSON.stringify(rows.slice(0,120))); }catch(e){}
    const seen=new Set(data.history.map(h=>h.id+"|"+h.d)); let added=false;
    rows.filter(r=>r.persona===ME).forEach(r=>{ const id=nameToId[r.tarea]; if(!id) return; const k=id+"|"+r.fecha; if(!seen.has(k)){ data.history.push({id,d:r.fecha}); seen.add(k); added=true; } });
    if(added){ save(); renderHoy(); } else renderBoard();
    sbFetchReq();
  }catch(e){
    try{ const c=localStorage.getItem(KEY+"_feed"); if(c){ feedRows=JSON.parse(c); renderBoard(); } }catch(_){}
  }
}

/* ===== eventos ===== */
document.addEventListener("click", e=>{
  const tap=e.target.closest("[data-tap]"); if(tap){ const id=tap.dataset.tap; doneToday(id)?unmark(id):mark(id); return; }
  const undo=e.target.closest("[data-undo]"); if(undo){ const id=nameToId[decodeURIComponent(undo.dataset.undo)]; if(id) unmark(id); return; }
  const sf=e.target.closest("[data-setfreq]"); if(sf){ data.freq[sf.dataset.setfreq]=sf.dataset.f; save(); renderAjustes(); return; }
  const h=e.target.closest(".sec h3.click"); if(h){ h.parentElement.classList.toggle("collapsed"); return; }
  if(e.target.closest("#wkHead")){ document.getElementById("wkcard").classList.toggle("open"); return; }
  if(e.target.closest("#bell")){ openReqModal(); return; }
  if(e.target.closest("#wkbtn")){ openWeekendModal(); return; }
  const wkd=e.target.closest("[data-wkdone]"); if(wkd){ const id=wkd.dataset.wkdone; closeModal(); mark(id); return; }
  if(e.target.closest("[data-openpick]")){ openPicker(); return; }
  const done=e.target.closest("[data-done]"); if(done){ const id=done.dataset.done; const r=reqIncoming.find(x=>String(x.id)===String(id)); closeModal(); sbResolve(id, r?r.tarea:null); return; }
  const cancel=e.target.closest("[data-cancel]"); if(cancel){ closeModal(); sbCancel(cancel.dataset.cancel); return; }
  const pick=e.target.closest("[data-pick]"); if(pick){ sbRequest(decodeURIComponent(pick.dataset.pick)); closeModal(); return; }
  if(e.target.closest("#modalClose")){ closeModal(); return; }
  if(e.target.id==="modal"){ closeModal(); return; }
});

function showView(v){
  document.getElementById("view-hoy").style.display=v==="hoy"?"block":"none";
  document.getElementById("view-ajustes").style.display=v==="ajustes"?"block":"none";
  if(v==="hoy") renderHoy(); else renderAjustes();
  window.scrollTo(0,0);
}
document.getElementById("goAjustes").addEventListener("click",()=>showView("ajustes"));
document.getElementById("backHoy").addEventListener("click",()=>showView("hoy"));
document.getElementById("allDone").addEventListener("click",()=>{ if(confirm("¿Marcar TODAS las tareas como hechas hoy? (útil al empezar)")){ TASKS.forEach(t=>{ if(!doneToday(t.id)) data.history.push({id:t.id,d:today()}); }); save(); renderAjustes(); } });
document.getElementById("reset").addEventListener("click",()=>{ if(confirm("¿Borrar todo el histórico de tareas hechas? (las frecuencias se mantienen)")){ data.history=[]; save(); renderAjustes(); } });

document.getElementById("date").textContent = new Date().toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"});
load();
renderHoy();
try{ const c=localStorage.getItem(KEY+"_feed"); if(c){ feedRows=JSON.parse(c); } }catch(e){}
renderBoard();
sbFetch();
sbFetchReq();
document.addEventListener("visibilitychange",()=>{ if(!document.hidden){ sbFetch(); } });
</script>
